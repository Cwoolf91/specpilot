name: Release Extension

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test:
    # Gate releases on the full test suite. Skip for [skip ci] commits
    # (which are the version-bump commits this workflow itself pushes).
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - name: Typecheck tests
        run: npm run typecheck:tests

      - name: Unit + webview tests
        run: npm test

      - name: Build extension for integration tests
        run: npm run build:extension

      - name: Integration tests (Extension Host)
        run: xvfb-run -a npm run test:integration

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

  release:
    needs: test
    runs-on: ubuntu-latest
    # Skip version bump commits from CI
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - run: npm ci

      - name: Determine release version
        id: version
        run: |
          # If package.json is already ahead of the latest git tag (manual
          # minor/major bump landed via PR), use it as-is. Otherwise bump patch.
          git fetch --tags --quiet
          PKG_VERSION=$(node -p "require('./package.json').version")
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1 | sed 's/^v//')
          LATEST_TAG=${LATEST_TAG:-0.0.0}
          HIGHER=$(node -e "const [a,b] = process.argv.slice(1).map(v => v.split('.').map(Number)); for (let i=0;i<3;i++){if(a[i]>b[i]){console.log('pkg');process.exit()} if(a[i]<b[i]){console.log('tag');process.exit()}} console.log('equal')" "$PKG_VERSION" "$LATEST_TAG")
          if [ "$HIGHER" = "pkg" ]; then
            echo "Using existing package.json version $PKG_VERSION (ahead of latest tag $LATEST_TAG)"
            VERSION=$PKG_VERSION
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          else
            npm version patch --no-git-tag-version
            VERSION=$(node -p "require('./package.json').version")
            echo "Bumped patch: $LATEST_TAG -> $VERSION"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build
        run: npm run build

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ "${{ steps.version.outputs.bumped }}" = "true" ]; then
            git add package.json package-lock.json
            git commit -m "v${{ steps.version.outputs.version }} [skip ci]"
          fi
          git tag "v${{ steps.version.outputs.version }}"
          if [ "${{ steps.version.outputs.bumped }}" = "true" ]; then
            git push --atomic origin main "v${{ steps.version.outputs.version }}"
          else
            git push origin "v${{ steps.version.outputs.version }}"
          fi

      - name: Package extension
        run: npx @vscode/vsce package

      - name: Generate checksum
        run: sha256sum *.vsix > checksums.sha256

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        if: env.VSCE_PAT != ''
        run: npx @vscode/vsce publish --pat "$VSCE_PAT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            *.vsix
            checksums.sha256
