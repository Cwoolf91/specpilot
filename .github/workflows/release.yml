name: Release Extension

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test:
    # Gate releases on the full test suite. Skip for [skip ci] commits
    # (which are the version-bump commits this workflow itself pushes).
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - name: Typecheck tests
        run: npm run typecheck:tests

      - name: Unit + webview tests
        run: npm test

      - name: Build extension for integration tests
        run: npm run build:extension

      - name: Integration tests (Extension Host)
        run: xvfb-run -a npm run test:integration

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

  release:
    needs: test
    runs-on: ubuntu-latest
    # Skip version bump commits from CI
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - run: npm ci

      - name: Bump patch version
        id: version
        run: |
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build
        run: npm run build

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "v${{ steps.version.outputs.version }} [skip ci]"
          git tag "v${{ steps.version.outputs.version }}"
          git push --atomic origin main "v${{ steps.version.outputs.version }}"

      - name: Package extension
        run: npx @vscode/vsce package

      - name: Generate checksum
        run: sha256sum *.vsix > checksums.sha256

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        if: env.VSCE_PAT != ''
        run: npx @vscode/vsce publish --pat "$VSCE_PAT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            *.vsix
            checksums.sha256
